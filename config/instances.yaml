---
virtualmachines:
  # Ansible Automation Platform Control Node
  - name: "control"
    image: "aap-2.6-6-ceh-20260325"
    memory: "32G"
    cores: 4
    image_size: "50Gi"
    tags:
      - key: "AnsibleGroup"
        value: "isolated"
    networks:
      - default
    userdata: |-
      #cloud-config
      user: rhel
      password: ansible123!
      chpasswd: { expire: False }
      runcmd:
        - echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/50-cloud-init.conf
        - systemctl reload sshd
    services:
      - name: control
        ports:
          - port: 443
            protocol: TCP
            targetPort: 443
            name: control-https
          - port: 22
            protocol: TCP
            targetPort: 22
            name: control-ssh
    routes:
      - name: control-https
        host: control
        service: control
        targetPort: 443
        tls: true
        tls_termination: reencrypt
